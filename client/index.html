<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#18181b" />
    <meta
      name="description"
      content="Browse, search and save recipes from around the world — works offline."
    />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Recipes" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <title>Recipes — MealDB Browser</title>
  </head>
  <body>
    <!-- Skip-to-content landmark for keyboard users -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <div id="root"></div>

    <!-- Register the service worker -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((reg) => console.log("[SW] Registered, scope:", reg.scope))
            .catch((err) => console.error("[SW] Registration failed:", err));
        });
      }
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
